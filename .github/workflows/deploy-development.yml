name: Deploy Development

on:
  workflow_run:
    workflows:
      - Build
    types:
      - completed
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-development
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VAR_project_name: article
  TF_IN_AUTOMATION: true

jobs:
  deploy:
    name: Deploy Development
    runs-on: ubuntu-latest
    environment: development
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Prepare Image Tags
        id: image_tags
        run: |
          set -euo pipefail

          COMMIT_SHA="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"
          DEPLOY_TAG="sha-${COMMIT_SHA}"

          echo "deploy_tag=${DEPLOY_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEVELOPMENT }}

      - name: Read Terraform Backend Config
        id: tf_backend
        env:
          PARAMETER_PREFIX: /shared/terraform-state-bucket
        run: |
          set -euo pipefail

          ACCESS_KEY_ID="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/access-key-id" --with-decryption --query 'Parameter.Value' --output text)"
          ACCOUNT_ID="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/account-id" --query 'Parameter.Value' --output text)"
          BUCKET_NAME="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/bucket-name" --query 'Parameter.Value' --output text)"
          SECRET_ACCESS_KEY="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/secret-access-key" --with-decryption --query 'Parameter.Value' --output text)"
          S3_ENDPOINT="https://${ACCOUNT_ID}.r2.cloudflarestorage.com"

          echo "::add-mask::${ACCESS_KEY_ID}"
          echo "::add-mask::${ACCOUNT_ID}"
          echo "::add-mask::${BUCKET_NAME}"
          echo "::add-mask::${SECRET_ACCESS_KEY}"
          echo "::add-mask::${S3_ENDPOINT}"

          echo "access_key_id=${ACCESS_KEY_ID}" >> "${GITHUB_OUTPUT}"
          echo "bucket_name=${BUCKET_NAME}" >> "${GITHUB_OUTPUT}"
          echo "secret_access_key=${SECRET_ACCESS_KEY}" >> "${GITHUB_OUTPUT}"
          echo "s3_endpoint=${S3_ENDPOINT}" >> "${GITHUB_OUTPUT}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init Pre-Development
        working-directory: terraform/environments/pre-development
        env:
          TF_BACKEND_ACCESS_KEY: ${{ steps.tf_backend.outputs.access_key_id }}
          TF_BACKEND_BUCKET_NAME: ${{ steps.tf_backend.outputs.bucket_name }}
          TF_BACKEND_SECRET_KEY: ${{ steps.tf_backend.outputs.secret_access_key }}
          TF_BACKEND_S3_ENDPOINT: ${{ steps.tf_backend.outputs.s3_endpoint }}
        run: |
          terraform init \
            -input=false \
            -backend-config="../../../backend.r2.hcl" \
            -backend-config="bucket=${TF_BACKEND_BUCKET_NAME}" \
            -backend-config="key=article/pre-development/terraform.tfstate" \
            -backend-config="endpoint=${TF_BACKEND_S3_ENDPOINT}" \
            -backend-config="access_key=${TF_BACKEND_ACCESS_KEY}" \
            -backend-config="secret_key=${TF_BACKEND_SECRET_KEY}"

      - name: Terraform Plan Pre-Development
        working-directory: terraform/environments/pre-development
        env:
          TF_VAR_project_name: ${{ env.TF_VAR_project_name }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply Pre-Development
        working-directory: terraform/environments/pre-development
        run: terraform apply -input=false -auto-approve tfplan

      - name: Terraform Init Development
        working-directory: terraform/environments/development
        env:
          TF_BACKEND_ACCESS_KEY: ${{ steps.tf_backend.outputs.access_key_id }}
          TF_BACKEND_BUCKET_NAME: ${{ steps.tf_backend.outputs.bucket_name }}
          TF_BACKEND_SECRET_KEY: ${{ steps.tf_backend.outputs.secret_access_key }}
          TF_BACKEND_S3_ENDPOINT: ${{ steps.tf_backend.outputs.s3_endpoint }}
          TF_VAR_project_name: ${{ env.TF_VAR_project_name }}
          TF_VAR_image_tag: ${{ steps.image_tags.outputs.deploy_tag }}
        run: |
          terraform init \
            -input=false \
            -backend-config="../../../backend.r2.hcl" \
            -backend-config="bucket=${TF_BACKEND_BUCKET_NAME}" \
            -backend-config="key=article/development/terraform.tfstate" \
            -backend-config="endpoint=${TF_BACKEND_S3_ENDPOINT}" \
            -backend-config="access_key=${TF_BACKEND_ACCESS_KEY}" \
            -backend-config="secret_key=${TF_BACKEND_SECRET_KEY}"

      - name: Terraform Plan Development
        working-directory: terraform/environments/development
        env:
          TF_VAR_project_name: ${{ env.TF_VAR_project_name }}
          TF_VAR_image_tag: ${{ steps.image_tags.outputs.deploy_tag }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply Development
        working-directory: terraform/environments/development
        env:
          TF_VAR_project_name: ${{ env.TF_VAR_project_name }}
          TF_VAR_image_tag: ${{ steps.image_tags.outputs.deploy_tag }}
        run: terraform apply -input=false -auto-approve tfplan
