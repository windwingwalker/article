name: Promote Production

on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: promote-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VAR_project_name: article
  ECR_REPOSITORY: article
  IMAGE_TAG: sha-${{ github.sha }}
  TF_IN_AUTOMATION: true

jobs:
  promote:
    name: Promote Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}

      - name: Read Terraform Backend Config
        id: tf_backend
        env:
          PARAMETER_PREFIX: /shared/terraform-state-bucket
        run: |
          set -euo pipefail

          ACCESS_KEY_ID="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/access-key-id" --with-decryption --query 'Parameter.Value' --output text)"
          ACCOUNT_ID="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/account-id" --query 'Parameter.Value' --output text)"
          BUCKET_NAME="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/bucket-name" --query 'Parameter.Value' --output text)"
          SECRET_ACCESS_KEY="$(aws ssm get-parameter --name "${PARAMETER_PREFIX}/secret-access-key" --with-decryption --query 'Parameter.Value' --output text)"
          S3_ENDPOINT="https://${ACCOUNT_ID}.r2.cloudflarestorage.com"

          echo "::add-mask::${ACCESS_KEY_ID}"
          echo "::add-mask::${ACCOUNT_ID}"
          echo "::add-mask::${BUCKET_NAME}"
          echo "::add-mask::${SECRET_ACCESS_KEY}"
          echo "::add-mask::${S3_ENDPOINT}"

          echo "access_key_id=${ACCESS_KEY_ID}" >> "${GITHUB_OUTPUT}"
          echo "bucket_name=${BUCKET_NAME}" >> "${GITHUB_OUTPUT}"
          echo "secret_access_key=${SECRET_ACCESS_KEY}" >> "${GITHUB_OUTPUT}"
          echo "s3_endpoint=${S3_ENDPOINT}" >> "${GITHUB_OUTPUT}"

      - name: Verify Promoted Image Exists
        run: |
          aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --region "${AWS_REGION}" \
            --query 'imageDetails[0].imageTags' \
            --output text

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init Production
        working-directory: terraform/environments/production
        env:
          TF_BACKEND_ACCESS_KEY: ${{ steps.tf_backend.outputs.access_key_id }}
          TF_BACKEND_BUCKET_NAME: ${{ steps.tf_backend.outputs.bucket_name }}
          TF_BACKEND_SECRET_KEY: ${{ steps.tf_backend.outputs.secret_access_key }}
          TF_BACKEND_S3_ENDPOINT: ${{ steps.tf_backend.outputs.s3_endpoint }}
        run: |
          terraform init \
            -input=false \
            -backend-config="../../../backend.r2.hcl" \
            -backend-config="bucket=${TF_BACKEND_BUCKET_NAME}" \
            -backend-config="key=article/production/terraform.tfstate" \
            -backend-config="endpoint=${TF_BACKEND_S3_ENDPOINT}" \
            -backend-config="access_key=${TF_BACKEND_ACCESS_KEY}" \
            -backend-config="secret_key=${TF_BACKEND_SECRET_KEY}"

      - name: Terraform Plan Production
        working-directory: terraform/environments/production
        env:
          TF_VAR_project_name: ${{ env.TF_VAR_project_name }}
          TF_VAR_image_tag: ${{ env.IMAGE_TAG }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply Production
        working-directory: terraform/environments/production
        env:
          TF_VAR_project_name: ${{ env.TF_VAR_project_name }}
          TF_VAR_image_tag: ${{ env.IMAGE_TAG }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Calculate Next Release Tag
        id: next_tag
        run: |
          git fetch --tags --force

          LAST_TAG="$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)"

          if [ -z "${LAST_TAG}" ]; then
            NEXT_TAG="v0.1.0"
          else
            VERSION="${LAST_TAG#v}"
            MAJOR="${VERSION%%.*}"
            REST="${VERSION#*.}"
            MINOR="${REST%%.*}"
            NEXT_MINOR=$((MINOR + 1))
            NEXT_TAG="v${MAJOR}.${NEXT_MINOR}.0"
          fi

          echo "last_tag=${LAST_TAG}" >> "${GITHUB_OUTPUT}"
          echo "next_tag=${NEXT_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create And Push Release Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.next_tag.outputs.next_tag }}" -m "Release ${{ steps.next_tag.outputs.next_tag }}" "${GITHUB_SHA}"
          git push origin "${{ steps.next_tag.outputs.next_tag }}"
