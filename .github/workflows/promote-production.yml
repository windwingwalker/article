name: Promote Production

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      source_stage_name:
        description: Alias name to promote from
        required: true
        type: string
        default: dev

permissions:
  contents: write
  id-token: write

concurrency:
  group: promote-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VAR_project_name: article
  TF_IN_AUTOMATION: true
  TF_VAR_source_stage_name: ${{ github.event_name == 'workflow_dispatch' && inputs.source_stage_name || 'dev' }}

jobs:
  promote:
    name: Promote Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PRODUCTION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init Production
        working-directory: terraform/environments/production
        env:
          TF_BACKEND_ACCESS_KEY: ${{ secrets.TF_BACKEND_ACCESS_KEY }}
          TF_BACKEND_SECRET_KEY: ${{ secrets.TF_BACKEND_SECRET_KEY }}
          TF_BACKEND_S3_ENDPOINT: ${{ secrets.TF_BACKEND_S3_ENDPOINT }}
        run: |
          terraform init \
            -input=false \
            -backend-config="../../../backend.r2.hcl" \
            -backend-config="key=article/production/terraform.tfstate" \
            -backend-config="endpoint=${TF_BACKEND_S3_ENDPOINT}" \
            -backend-config="access_key=${TF_BACKEND_ACCESS_KEY}" \
            -backend-config="secret_key=${TF_BACKEND_SECRET_KEY}"

      - name: Terraform Plan Production
        working-directory: terraform/environments/production
        env:
          TF_VAR_project_name: ${{ env.TF_VAR_project_name }}
          TF_VAR_source_stage_name: ${{ env.TF_VAR_source_stage_name }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply Production
        working-directory: terraform/environments/production
        env:
          TF_VAR_project_name: ${{ env.TF_VAR_project_name }}
          TF_VAR_source_stage_name: ${{ env.TF_VAR_source_stage_name }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Calculate Next Release Tag
        id: next_tag
        run: |
          git fetch --tags --force

          LAST_TAG="$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)"

          if [ -z "${LAST_TAG}" ]; then
            NEXT_TAG="v0.1.0"
          else
            VERSION="${LAST_TAG#v}"
            MAJOR="${VERSION%%.*}"
            REST="${VERSION#*.}"
            MINOR="${REST%%.*}"
            NEXT_MINOR=$((MINOR + 1))
            NEXT_TAG="v${MAJOR}.${NEXT_MINOR}.0"
          fi

          echo "last_tag=${LAST_TAG}" >> "${GITHUB_OUTPUT}"
          echo "next_tag=${NEXT_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create And Push Release Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.next_tag.outputs.next_tag }}" -m "Release ${{ steps.next_tag.outputs.next_tag }}" "${GITHUB_SHA}"
          git push origin "${{ steps.next_tag.outputs.next_tag }}"
